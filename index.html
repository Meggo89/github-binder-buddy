<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <meta name="theme-color" content="#050E1F" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts - Inter, Playfair Display, JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <title>Off-market M&A for UK SME owners | Mastella Advisory</title>
    <meta name="description" content="Off-market M&A for UK SME owners with £5–50M turnover. We find buyers other advisors don&#39;t reach. Confidential sell-side, fundraising and exit readiness." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mastellagroup.com" />
    <meta property="og:title" content="Off-market M&A for UK SME owners | Mastella Advisory" />
    <meta property="og:description" content="Off-market M&A for UK SME owners with £5–50M turnover. We find buyers other advisors don&#39;t reach. Confidential sell-side, fundraising and exit readiness." />
    <meta property="og:image" content="https://mastellagroup.com/og-image.png?v=3" />
    <meta property="og:site_name" content="Mastella Advisory" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://mastellagroup.com" />
    <meta name="twitter:title" content="Off-market M&A for UK SME owners | Mastella Advisory" />
    <meta name="twitter:description" content="Off-market M&A for UK SME owners with £5–50M turnover. Confidential sell-side, fundraising and exit readiness." />
    <meta name="twitter:image" content="https://mastellagroup.com/og-image.png?v=3" />

    <!-- Crawl + locale -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="author" content="Mastella Advisory" />
    <meta name="geo.region" content="GB" />
    <meta name="geo.placename" content="London" />
    <link rel="canonical" href="https://mastellagroup.com" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="Hp7X0B-pF0vCa93ad2rDPjwdD_JViAt8qjTDMMcaxWE" />

    <!-- Structured Data: Organization + WebSite + ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://mastellagroup.com/#organization",
          "name": "Mastella Advisory",
          "url": "https://mastellagroup.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://mastellagroup.com/favicon.svg",
            "width": 512,
            "height": 512
          },
          "email": "leo@mastellagroup.com",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "International House, 101 King's Cross Rd",
            "addressLocality": "London",
            "postalCode": "WC1X 9LP",
            "addressCountry": "GB"
          },
          "sameAs": [
            "https://www.linkedin.com/company/mastella-advisory"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://mastellagroup.com/#website",
          "url": "https://mastellagroup.com",
          "name": "Mastella Advisory",
          "inLanguage": "en-GB",
          "publisher": { "@id": "https://mastellagroup.com/#organization" }
        },
        {
          "@type": "ProfessionalService",
          "@id": "https://mastellagroup.com/#service",
          "name": "Mastella Advisory",
          "description": "Off-market M&A advisory for UK owner-managed SMEs with £5–50M turnover.",
          "url": "https://mastellagroup.com",
          "image": "https://mastellagroup.com/og-image.png?v=3",
          "areaServed": { "@type": "Country", "name": "United Kingdom" },
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "International House, 101 King's Cross Rd",
            "addressLocality": "London",
            "postalCode": "WC1X 9LP",
            "addressCountry": "GB"
          },
          "openingHoursSpecification": [{
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
            "opens": "09:00",
            "closes": "17:30"
          }],
          "provider": { "@id": "https://mastellagroup.com/#organization" }
        }
      ]
    }
    </script>
  </head>
  <body>
    <!--
      Hidden form templates - Netlify's build scanner detects these and
      enables the live /contact and /lead-magnet endpoints. The React
      forms post URL-encoded payloads to "/" with form-name set.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="company" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="interest" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="lead-magnet" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
